services:
  postgres:
    image: postgres:16-alpine
    container_name: pets-api-postgres
    environment:
      POSTGRES_DB: pets_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pets-api-postgres-data:/var/lib/postgresql/data

volumes:
  pets-api-postgres-data:
